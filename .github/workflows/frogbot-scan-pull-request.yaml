name: "Frogbot Scan Pull Request"
on:
  pull_request_target:
    types: [opened, synchronize]
permissions:
  pull-requests: write
  contents: read
  id-token: write
jobs:
  scan-pull-request:
    runs-on: ubuntu-latest
    steps:
      - uses: jfrog/frogbot@v2
        with:
          # 👈 Use the same OIDC provider name from your Golden Reference
          oidc-provider-name: github-oidc
        env:
          # [Mandatory]
          JF_URL: ${{ vars.JF_URL }}

          # [Mandatory]
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # [Optional] Xray Watches to apply
          JF_WATCHES: "build-watch"

          # [Optional] Show all vulnerabilities, not just the ones introduced in the PR
          JF_INCLUDE_ALL_VULNERABILITIES: "true"        
